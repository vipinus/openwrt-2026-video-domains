name: Monthly force-cn CIDR refresh

# Regenerate force-cn-cidrs.txt (Tencent overseas BGP + Fastly 151.101/16)
# on the last day of each month. OpenWrt routers pull this file on the 1st.

on:
  schedule:
    - cron: '55 23 28-31 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm last-day-of-month
        id: gate
        run: |
          tomorrow=$(date -u -d "tomorrow" +%d)
          if [ "$tomorrow" != "01" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "skip=1" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != '1'

      - name: Install deps
        if: steps.gate.outputs.skip != '1'
        run: sudo apt-get install -y -qq whois python3

      - name: Fetch + aggregate RADB
        if: steps.gate.outputs.skip != '1'
        run: |
          for asn in AS132203 AS139341; do
              whois -h whois.radb.net "!g$asn" > "/tmp/${asn}.raw"
          done
          python3 <<'PY'
          import re, ipaddress, datetime
          seen = set()
          for f in ("/tmp/AS132203.raw", "/tmp/AS139341.raw"):
              raw = open(f).read()
              body = re.sub(r'^A\d+\s*', '', raw)
              body = re.sub(r'\s*C\s*$', '', body)
              body = body.replace('\n', '')
              for t in re.split(r'\s+', body):
                  if re.fullmatch(r'(\d{1,3}\.){3}\d{1,3}/(8|9|1[0-9]|2[0-9]|3[0-2])', t):
                      try:
                          seen.add(ipaddress.IPv4Network(t, strict=False))
                      except ValueError: pass
          agg = list(ipaddress.collapse_addresses(seen))
          UN_IP = ipaddress.IPv4Address("47.242.64.28")
          filt = [n for n in agg if UN_IP not in n]
          excl = [str(n) for n in agg if UN_IP in n]
          today = datetime.date.today().isoformat()
          with open('./force-cn-cidrs.txt', 'w') as o:
              o.write("# Tencent overseas BGP prefixes — AS132203 (Tencent Cloud) + AS139341 (ACE)\n")
              o.write("# Auto-generated monthly by .github/workflows/monthly-force-cn-refresh.yml\n")
              o.write(f"# Generated {today} UTC. {len(filt)} prefixes after aggregation.\n")
              if excl:
                  o.write(f"# Excluded (contains un.fanq.in 47.242.64.28): {excl}\n")
              o.write("#\n")
              for n in sorted(filt, key=lambda x:(int(x.network_address), x.prefixlen)):
                  o.write(f"{n}\n")
              o.write("\n# ===== Third-party CDN used by Tencent Video overseas =====\n")
              o.write("# Fastly anycast: Tencent Video OTT region endpoints fall back here.\n")
              o.write("# Trade-off: other Fastly-hosted sites also route through CN tunnel.\n")
              o.write("151.101.0.0/16\n")
          print(f"wrote {len(filt)} Tencent + 1 Fastly")
          PY

      - name: Commit if changed
        if: steps.gate.outputs.skip != '1'
        id: commit
        run: |
          git config user.email "bot@anyfq.com"
          git config user.name  "force-cn bot"
          git add force-cn-cidrs.txt
          if git diff --cached --quiet; then
              echo "changed=0" >> $GITHUB_OUTPUT; exit 0
          fi
          CNT=$(grep -cE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+' force-cn-cidrs.txt)
          git commit -m "chore(force-cn): monthly refresh — ${CNT} prefixes"
          git push
          echo "changed=1" >> $GITHUB_OUTPUT
          echo "count=${CNT}" >> $GITHUB_OUTPUT

      - name: Discord notify
        if: always() && steps.gate.outputs.skip != '1'
        run: |
          CHG="${{ steps.commit.outputs.changed }}"
          CNT="${{ steps.commit.outputs.count }}"
          if [ "${{ job.status }}" = "success" ] && [ "$CHG" = "1" ]; then
              MSG="✅ force-cn-cidrs refreshed: \`${CNT}\` prefixes"
          elif [ "${{ job.status }}" = "success" ]; then
              MSG="ℹ️ force-cn-cidrs refresh: no change"
          else
              MSG="🚨 force-cn-cidrs refresh FAILED (${{ github.run_id }})"
          fi
          curl -s -X POST -H 'Content-Type: application/json' \
               -d "{\"content\": \"${MSG}\"}" \
               "${{ secrets.DISCORD_WEBHOOK }}" || true
